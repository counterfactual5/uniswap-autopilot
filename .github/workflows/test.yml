name: Test

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Validate policy.yaml
        run: |
          python -m pip install pyyaml
          python - <<'PY'
          import pathlib, sys, yaml
          p = pathlib.Path("policy.yaml")
          if not p.exists():
              print("no policy.yaml, skipping")
              sys.exit(0)
          data = yaml.safe_load(p.read_text())
          assert isinstance(data, dict), "policy.yaml must be a mapping"
          print("policy.yaml OK:", list(data.keys()))
          PY

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=60
