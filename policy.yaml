# StageForge Risk Policy — all rules are optional (absent = no limit)
#
# Resolution order:
#   1. Explicit path argument to load_policy()
#   2. POLICY_FILE environment variable
#   3. ~/.stageforge/policy.yaml (this file)
#   4. ~/.stageforge/policy.json
#
# Rules cascade: project sections override global, non-null values win.

# ── Global defaults ──────────────────────────────────────────────────────────

global:
  # Hard reject — trade amount in USD (native or stablecoin equivalent)
  max_amount: 1000

  # Hard reject — chains NOT in this list are blocked
  allowed_chains:
    - ethereum
    - polygon
    - base
    - arbitrum
    - optimism
    - hyperliquid

  # Hard reject — addresses in this list are blocked
  blacklist_addresses: []
  # Example: ["0x0000000000000000000000000000000000000000"]

  # Soft warn — if non-empty, addresses NOT in this list generate a warning
  whitelist_addresses: []

  # Hard reject — max slippage in basis points (1 bp = 0.01%)
  max_slippage_bps: 500     # 5 %

  # Soft warn — gas price above this generates a warning (gwei)
  max_gas_price_gwei: 100   # 100 gwei

# ── Per-project overrides ────────────────────────────────────────────────────

evm-wallet-scanner:
  max_amount: 500           # transfers are lower risk — tighter cap

hyperliquid-autopilot:
  max_amount: 2000          # perp trading — larger positions
  allowed_chains:
    - hyperliquid           # hyperliquid-only
  max_slippage_bps: 200     # 2 % — perp markets need tighter slippage
  max_leverage: 10          # check_hyperliquid(): hard reject over 10x
  allowed_coins: []         # empty = allow all

polymarket-autopilot:
  max_amount: 500           # prediction markets — moderate cap
  allowed_chains:
    - polygon               # polymarket is polygon-only
  min_price: 0.01           # check_polymarket(): reject below 1 cent
  max_price: 0.99           # check_polymarket(): reject above 99 cents
  max_position_value: 5000  # check_polymarket(): max total position

uniswap-autopilot:
  max_amount: 2000          # DEX swaps — higher cap
  allowed_chains:
    - ethereum
    - polygon
    - base
    - arbitrum
    - optimism
  max_slippage_bps: 300     # 3 % — DEX trades
  # min_output_amount: 0.0  # check_uniswap(): disabled — set a positive value to enforce
